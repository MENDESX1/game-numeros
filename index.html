    <!-- Global capture for PWA install prompt to prevent React race conditions -->

      window.deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {

        window.dispatchEvent(new CustomEvent('pwa-installable'));
      });
    </script>
